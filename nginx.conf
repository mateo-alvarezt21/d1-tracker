# Cache-Control según tipo de archivo. Se resuelve con un map para poder
# declarar TODAS las cabeceras (caché + seguridad) en un solo bloque y evitar
# el footgun de nginx: si un `location` define su propio add_header, deja de
# heredar los del server. Con esto no usamos add_header dentro de location.
map $uri $cache_control {
    default                                "no-cache";
    ~*\.(?:png|svg|ico|jpg|jpeg|webp)$     "public, max-age=604800, immutable";
}

server {
    listen       80;
    listen       [::]:80;
    server_name  _;
    root   /usr/share/nginx/html;
    index  index.html;

    # No revelar la versión de nginx.
    server_tokens off;

    # Compresión
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/css application/javascript image/svg+xml application/manifest+json text/plain;

    # Caché por tipo (HTML/JS/CSS revalidan; imágenes cache largo).
    add_header Cache-Control $cache_control always;

    # ===== Cabeceras de seguridad (en todas las respuestas) =====
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=(), payment=(), usb=(), interest-cohort=()" always;
    add_header Strict-Transport-Security "max-age=31536000" always;
    # CSP a la medida de la app: scripts solo propios (mitiga XSS), estilos
    # propios + inline (la app usa style="" y element.style), fuentes de Google.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self'; connect-src 'self'; manifest-src 'self'; base-uri 'self'; form-action 'none'; frame-ancestors 'none'; object-src 'none'; upgrade-insecure-requests" always;

    # SPA-friendly: cualquier ruta cae a index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
