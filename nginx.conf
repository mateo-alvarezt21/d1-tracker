server {
    listen       80;
    server_name  _;
    root   /usr/share/nginx/html;
    index  index.html;

    # Compresión
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/css application/javascript image/svg+xml application/manifest+json text/plain;

    # HTML, JS y CSS revalidan siempre (evita servir versiones viejas en caché).
    # Como no hay hash en los nombres de archivo, usamos no-cache + ETag.
    location ~* \.(?:html|js|css|webmanifest)$ {
        add_header Cache-Control "no-cache";
    }

    # Imágenes e iconos: cache largo (no cambian seguido).
    location ~* \.(?:png|svg|ico|jpg|jpeg)$ {
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    # SPA-friendly: cualquier ruta cae a index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
